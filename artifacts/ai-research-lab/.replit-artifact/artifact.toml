kind = "web"
previewPath = "/"
title = "AI Research Lab"
version = "1.0.0"
id = "artifacts/ai-research-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22149

[services.development]
run = "pnpm --filter @workspace/ai-research-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-research-lab", "run", "build" ]
publicDir = "artifacts/ai-research-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22149"
BASE_PATH = "/"
